<div class="container-mx-auto p-4">
  <div class="flex items-center justify-between border-b-2 border-gray-300 mb-4">
    <h1 class="text-3xl text-yellow-600 p-2 m-2">Products</h1>
    <button
      mat-stroked-button
      color="primary"
      aria-label="Add new customer"
      class="mb-4"
      (click)="addCustomer()"
    >
      Add new Customer<mat-icon>add</mat-icon>
    </button>
  </div>
  <table
    mat-table
    [dataSource]="dataSource()"
    matSort
    (matSortChange)="announceSortChange($event)"
    class="mat-elevation-z8"
  >
    <!-- Id Column -->
    <ng-container matColumnDef="id">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by id">
        Id
      </th>
      <td mat-cell *matCellDef="let element">{{ element.id }}</td>
    </ng-container>

    <!-- Name Column -->
    <ng-container matColumnDef="name">
      <th mat-header-cell *matHeaderCellDef mat-sort-header sortActionDescription="Sort by name">
        Name
      </th>
      <td mat-cell *matCellDef="let element">{{ element.name }}</td>
    </ng-container>
    <!-- Actions Column -->
    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let element">
        <!-- Add action buttons here, e.g., edit and delete -->
        <button mat-icon-button aria-label="Edit customer" (click)="editCustomer(element)">
          <mat-icon class="edit-btn">edit</mat-icon>
        </button>
        <button mat-icon-button aria-label="Delete customer">
          <mat-icon class="delete-btn">delete</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
