<div class="container mx-auto p-4">
  <div class="flex justify-between items-center mb-4">
    <h1 class="text-3xl text-yellow-600 p-2 m-2">Customer Details</h1>

    <button matButton mat-dialog-close>Cancel</button>
    <button matButton cdkFocusInitial (click)="onSubmit()"><mat-icon>save</mat-icon> Submit</button>
  </div>

  <form class="flex flex-col gap-4">
    <mat-form-field class="example-full-width">
      <mat-label>Name</mat-label>
      <input matInput placeholder="John Doe" [formField]="customerForm.name" />
      @if (customerForm.name().invalid() && customerForm.name().touched()) {
        @for (error of customerForm.name().errors(); track error.kind) {
          <mat-error>{{ error.message }}</mat-error>
        }
      }
    </mat-form-field>
  </form>
</div>
